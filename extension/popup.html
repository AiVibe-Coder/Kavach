<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 320px; min-height: 100px;
  background: #0f0f13; color: #f0f0f7;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
}
.header {
  padding: 14px 16px 10px;
  background: #1a1a24;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  display: flex; align-items: center; gap: 10px;
}
.logo { font-size: 18px; font-weight: 800; }
.logo span { color: #F5A623; }
.domain { font-size: 11px; color: #888; margin-top: 1px; }
.gear { margin-left: auto; background: none; border: none; color: #888; cursor: pointer; font-size: 16px; padding: 2px 4px; }
.gear:hover { color: #f0f0f7; }

.status-bar {
  padding: 8px 16px; font-size: 11px;
  display: flex; align-items: center; gap: 6px;
}
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot.green { background: #43d68a; }
.dot.red   { background: #f5535d; }
.dot.grey  { background: #555; }

.list { padding: 8px; max-height: 340px; overflow-y: auto; }
.item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px;
  margin-bottom: 6px; cursor: pointer;
  border: 1px solid transparent;
  transition: background 0.15s, border-color 0.15s;
}
.item:hover { background: #1a1a24; border-color: rgba(124,106,247,0.3); }
.item-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, #7c6af7, #4ecdc4);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0; font-weight: 700; color: #fff;
}
.item-info { flex: 1; min-width: 0; }
.item-title { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-user  { font-size: 11px; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fill-btn {
  background: #7c6af7; color: #fff; border: none;
  padding: 5px 12px; border-radius: 7px; font-size: 12px;
  font-weight: 600; cursor: pointer; flex-shrink: 0;
  transition: background 0.15s;
}
.fill-btn:hover { background: #9b8bff; }
.fill-btn.copied { background: #43d68a; }

.empty {
  text-align: center; padding: 24px 16px;
  color: #555; font-size: 13px; line-height: 1.6;
}
.empty .icon { font-size: 32px; display: block; margin-bottom: 8px; }

.search-box {
  padding: 8px 8px 0;
}
.search-box input {
  width: 100%; background: #1a1a24; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; padding: 7px 10px; color: #f0f0f7; font-size: 12px;
  outline: none;
}
.search-box input:focus { border-color: #7c6af7; }

.setup-box {
  padding: 16px; text-align: center; line-height: 1.7; color: #888;
}
.setup-box a {
  color: #F5A623; text-decoration: none; font-weight: 600;
}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="logo">Ka<span>V</span>ach</div>
    <div class="domain" id="domain-label">—</div>
  </div>
  <button class="gear" id="settings-btn" title="Extension settings">⚙</button>
</div>

<div class="status-bar" id="status-bar">
  <div class="dot grey" id="status-dot"></div>
  <span id="status-text">Connecting...</span>
</div>

<div id="main-content">
  <div class="search-box" id="search-box" style="display:none">
    <input type="text" id="search-input" placeholder="Search passwords..." autocomplete="off"/>
  </div>
  <div class="list" id="results-list"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
