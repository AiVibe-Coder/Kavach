<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>KaVach Extension Settings</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f0f13; color: #f0f0f7;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  padding: 40px; max-width: 520px; margin: 0 auto;
}
h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
h1 span { color: #F5A623; }
.sub { color: #888; font-size: 13px; margin-bottom: 32px; }
label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
input {
  width: 100%; background: #1a1a24; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; padding: 12px 14px; color: #f0f0f7;
  font-size: 13px; font-family: monospace; outline: none; margin-bottom: 8px;
}
input:focus { border-color: #7c6af7; }
.btn {
  background: #7c6af7; color: #fff; border: none;
  padding: 10px 24px; border-radius: 10px; font-size: 14px;
  font-weight: 600; cursor: pointer;
}
.btn:hover { background: #9b8bff; }
.msg { font-size: 13px; margin-top: 10px; min-height: 20px; }
.msg.ok  { color: #43d68a; }
.msg.err { color: #f5535d; }
.how {
  margin-top: 32px; background: #1a1a24; border-radius: 12px;
  padding: 20px; border: 1px solid rgba(255,255,255,0.07);
}
.how h2 { font-size: 14px; margin-bottom: 12px; }
.step { display: flex; gap: 10px; margin-bottom: 10px; font-size: 13px; color: #aaa; line-height: 1.5; }
.step-num {
  width: 22px; height: 22px; border-radius: 50%; background: #7c6af7;
  color: #fff; font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
}
</style>
</head>
<body>
<h1>Ka<span>V</span>ach <span style="color:#888;font-weight:400;font-size:16px">Extension</span></h1>
<p class="sub">Connect this extension to your local KaVach app</p>

<label>API Token</label>
<input type="password" id="token-input" placeholder="Paste token from KaVach → Settings → Browser Extension"/>
<button class="btn" id="save-btn">Save & Test</button>
<div class="msg" id="msg"></div>

<div class="how">
  <h2>How to get your token</h2>
  <div class="step"><div class="step-num">1</div><div>Open <strong>KaVach</strong> on your Mac / PC</div></div>
  <div class="step"><div class="step-num">2</div><div>Go to <strong>Settings → Browser Extension</strong></div></div>
  <div class="step"><div class="step-num">3</div><div>Click <strong>Copy Token</strong> and paste it above</div></div>
  <div class="step"><div class="step-num">4</div><div>Click <strong>Save &amp; Test</strong> — done!</div></div>
</div>

<script>
async function load() {
  const { apiToken } = await chrome.storage.local.get('apiToken')
  if (apiToken) document.getElementById('token-input').value = apiToken
}

document.getElementById('save-btn').addEventListener('click', async () => {
  const token = document.getElementById('token-input').value.trim()
  const msg   = document.getElementById('msg')
  if (!token) { msg.textContent = 'Please paste a token'; msg.className = 'msg err'; return }

  await chrome.storage.local.set({ apiToken: token })

  // Test connection
  msg.textContent = 'Testing connection...'
  msg.className = 'msg'
  try {
    const res = await fetch('http://127.0.0.1:3847/api/ext/ping', {
      headers: { Authorization: `Bearer ${token}` }
    })
    if (res.ok) {
      msg.textContent = '✓ Connected to KaVach!'
      msg.className = 'msg ok'
    } else if (res.status === 401) {
      msg.textContent = '✕ Wrong token — copy it again from KaVach Settings'
      msg.className = 'msg err'
    } else if (res.status === 503) {
      msg.textContent = '✓ Token saved. Unlock KaVach to use the extension.'
      msg.className = 'msg ok'
    }
  } catch {
    msg.textContent = '✕ Could not reach KaVach — make sure it is running'
    msg.className = 'msg err'
  }
})

load()
</script>
</body>
</html>
